AutoName: Web of Trust
Summary: Decentralized identity through face-to-face verification
Description: |
  Web of Trust lets you build a decentralized digital identity — verified
  through real, face-to-face encounters.

  No central authority. No corporate accounts. Just people verifying each other.

  Features:
  * Create your self-sovereign cryptographic identity (BIP39 seed, Ed25519 keys)
  * Unlock with fingerprint or face recognition — no password needed
  * Verify contacts in person via QR code scanning
  * Issue and receive attestations
  * Share data in encrypted group spaces with real-time sync
  * Works offline — sync when you reconnect
  * Multi-device support

  Your keys never leave your device. All data that leaves your device is
  encrypted and signed. Built on open standards (did:key, HKDF, Yjs CRDTs).

  100% free and open-source software. No Google dependencies.

RepoType: git
Repo: https://github.com/real-life-org/web-of-trust.git

Builds:
  - versionName: 0.2.1
    versionCode: 3
    commit: v0.2.1
    subdir: apps/demo/android
    sudo:
      - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
      - apt-get install -y nodejs
      - corepack enable
      - corepack prepare pnpm@9.15.4 --activate
    init: "cd ../../..\npnpm install --frozen-lockfile\nexport VITE_BASE_PATH=/ VITE_UPDATE_SERVER_URL=https://web-of-trust.de
      VITE_UPDATE_CHANNEL=android-foss\npnpm build\ncd apps/demo\nnpx cap sync android"
    gradle:
      - fdroid
    output: app/build/outputs/apk/fdroid/release/app-fdroid-release-unsigned.apk
    scanignore:
      - apps/demo/android/app/src/main/assets/public/assets
    scandelete:
      - node_modules
      - apps/demo/dist
      - apps/benchmark/dist
    ndk: r27c

AutoUpdateMode: Version
UpdateCheckMode: Tags ^v
UpdateCheckData: apps/demo/android/version.properties|VERSION_CODE=(\d+)|.|VERSION_NAME=(.+)
CurrentVersion: 0.2.1
CurrentVersionCode: 3
